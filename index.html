<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘲哳 Project</title>
    <!-- 关键：开启浏览器缓存，减少重复请求 -->
    <meta http-equiv="Cache-Control" content="public, max-age=86400">
    <meta http-equiv="Pragma" content="cache">

    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 视频背景 - 强制优先加载 */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000; /* 兜底黑色，加载中不空白 */
            z-index: 1;
        }

        .video-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            /* 强制硬件加速，渲染更快 */
            transform: translateZ(0);
        }

        /* 图片层 - 懒加载占位 */
        .image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            background-size: cover;
            background-position: center;
            z-index: 2;
            display: none;
        }

        .image-layer.active {
            display: block;
        }

        /* 标题容器 - 秒显，无依赖 */
        .title-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999;
            pointer-events: none;
        }

        #zhaozha-title {
            text-align: center;
            font-size: 60px;
            color: #fff;
            text-shadow: 0 0 15px #000;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 40px;
            border-radius: 10px;
            animation: float 4s ease-in-out infinite;
            transform: translateZ(0);
        }

        /* 按钮样式 */
        .prev-btn, .next-btn, .home-btn, .start-btn, .music-btn {
            position: fixed;
            border: none;
            color: white;
            cursor: pointer;
            z-index: 20;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            background: rgba(0, 0, 0, 0.7);
            transition: background 0.1s ease;
        }

        .prev-btn {
            left: 30px;
            bottom: 50%;
            transform: translateY(50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .next-btn {
            right: 30px;
            bottom: 50%;
            transform: translateY(50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .start-btn {
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 18px;
        }

        .home-btn {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 18px;
        }

        .music-btn {
            top: 30px;
            right: 30px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
        }

        .prev-btn:hover, .next-btn:hover, .home-btn:hover, .start-btn:hover, .music-btn:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        @keyframes float {
            0% { transform: translateY(0px) translateZ(0); }
            50% { transform: translateY(-8px) translateZ(0); }
            100% { transform: translateY(0px) translateZ(0); }
        }

        audio {
            display: none;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            #zhaozha-title {
                font-size: 40px;
                padding: 15px 25px;
            }
            .prev-btn, .next-btn {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .prev-btn { left: 15px; }
            .next-btn { right: 15px; }
            .start-btn {
                padding: 10px 25px;
                font-size: 16px;
                bottom: 80px;
            }
            .home-btn {
                padding: 10px 25px;
                font-size: 16px;
                bottom: 20px;
            }
            .music-btn {
                top: 20px;
                right: 20px;
                padding: 8px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景音乐 - 懒加载 -->
    <audio id="bg-music" loop preload="none">
        <source src="1.ogg" type="audio/ogg">
        <source src="1.mp3" type="audio/mpeg">
    </audio>

    <!-- 视频 - 强制立即加载+自动播放 -->
    <div class="video-container">
        <video class="video-bg" loop muted playsinline autoplay preload="auto" src="bt.mp4"></video>
    </div>

    <!-- 图片层 -->
    <div class="image-layer" id="imageLayer"></div>

    <!-- 标题 - 秒显 -->
    <div class="title-container" id="titleContainer">
        <p id="zhaozha-title">“欢迎来到嘲哳 Project”</p>
    </div>

    <!-- 按钮组 -->
    <button class="prev-btn">◀</button>
    <button class="next-btn">▶</button>
    <button class="start-btn">开始找寻</button>
    <button class="home-btn">回到首页</button>
    <button class="music-btn">播放音乐</button>

    <script>
        // DOM缓存
        const bgMusic = document.getElementById('bg-music');
        const musicBtn = document.querySelector('.music-btn');
        const imageLayer = document.getElementById('imageLayer');
        const titleContainer = document.getElementById('titleContainer');
        const videoBg = document.querySelector('.video-bg');
        const prevBtn = document.querySelector('.prev-btn');
        const nextBtn = document.querySelector('.next-btn');
        const homeBtn = document.querySelector('.home-btn');
        const startBtn = document.querySelector('.start-btn');

        // 状态管理
        let isMusicPlaying = false;
        const images = [
            "fengmiantu.png",
            "fengmiantu2.png"
        ];
        let currentImageIndex = -1;
        const imageCache = new Map(); // 图片缓存，避免重复加载

        // 图片懒加载（点击才加载）
        function lazyLoadImage(src) {
            if (imageCache.has(src)) return Promise.resolve(imageCache.get(src));
            
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.src = src;
                
                img.onload = () => {
                    imageCache.set(src, img);
                    resolve(img);
                };
                img.onerror = () => resolve(null);
            });
        }

        // 更新显示逻辑
        async function updateDisplay() {
            if (currentImageIndex === -1) {
                imageLayer.classList.remove('active');
                titleContainer.style.display = 'block'; // 强制显示标题
            } else {
                imageLayer.classList.add('active');
                titleContainer.style.display = 'none';
                
                const idx = Math.abs(currentImageIndex) % images.length;
                const img = await lazyLoadImage(images[idx]);
                if (img) imageLayer.style.backgroundImage = `url("${images[idx]}")`;
            }
        }

        // 按钮事件
        prevBtn.addEventListener('click', () => {
            currentImageIndex++;
            updateDisplay();
        });

        nextBtn.addEventListener('click', () => {
            currentImageIndex--;
            updateDisplay();
        });

        homeBtn.addEventListener('click', () => {
            currentImageIndex = -1;
            updateDisplay();
        });

        startBtn.addEventListener('click', () => {
            window.location.href = 'index2.html';
        });

        musicBtn.addEventListener('click', () => {
            if (isMusicPlaying) {
                bgMusic.pause();
                isMusicPlaying = false;
                musicBtn.textContent = "播放音乐";
            } else {
                bgMusic.load();
                bgMusic.play().catch(() => alert("请先点击页面空白处解锁音频"));
                isMusicPlaying = true;
                musicBtn.textContent = "暂停音乐";
            }
        });

        // 初始化：页面加载完成就显示标题，视频已自动播放
        window.addEventListener('load', () => {
            updateDisplay();
            videoBg.playbackRate = 0.75; // 确保播放速度生效
        });

        // 更早触发视频加载
        document.addEventListener('DOMContentLoaded', () => {
            videoBg.load();
        });
    </script>
</body>
</html>
