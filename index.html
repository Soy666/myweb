<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘲哳 Project</title>
    <link rel="stylesheet" href="style.css">

    <!-- 预加载音频和图片 -->
    <link rel="preload" href="1.ogg" as="audio" type="audio/ogg">
    <link rel="preload" href="fengmiantu.png" as="image" fetchpriority="high">
    <link rel="preload" href="fengmiantu2.png" as="image" fetchpriority="high">

    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 视频背景（固定，不切换） */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            object-position: center;
            z-index: 1; /* 最底层 */
        }

        /* 图片层（叠加在视频上，可切换） */
        .image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2; /* 视频之上，按钮之下 */
            /* 图片切换过渡 */
            transition: background-image 0.1s ease-out;
            /* 初始隐藏图片层（首页仅显示视频） */
            display: none;
        }

        /* 图片层激活显示 */
        .image-layer.active {
            display: block;
        }

        /* 标题容器 - 固定层级+可隐藏 */
        .title-container {
            position: fixed;
            z-index: 999;
            pointer-events: none;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.1s ease, visibility 0.1s ease;
        }

        .title-container.hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* 标题样式 */
        #zhaozha-title {
            text-align: center;
            font-size: 60px;
            color: #fff;
            text-shadow: 0 0 15px #000, 0 0 30px #000, 3px 3px 6px rgba(0,0,0,0.9);
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 40px;
            border-radius: 10px;
            animation: float 4s ease-in-out infinite;
        }

        /* 左侧切换按钮（切下一张图） */
        .prev-btn {
            position: fixed;
            left: 30px;
            bottom: 50%;
            transform: translateY(50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        .prev-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: translateY(50%) scale(1.1);
        }

        /* 右侧切换按钮（切上一张图） */
        .next-btn {
            position: fixed;
            right: 30px;
            bottom: 50%;
            transform: translateY(50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        .next-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: translateY(50%) scale(1.1);
        }

        /* 回到首页按钮 */
        .home-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            z-index: 20;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        .home-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: translateX(-50%) scale(1.05);
        }

        /* 音乐开关按钮 */
        .music-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            padding: 10px 20px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            z-index: 20;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        .music-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            scale: 1.05;
        }

        /* 浮动动画 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* 隐藏音频控件 */
        audio {
            display: none;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            #zhaozha-title {
                font-size: 40px;
                padding: 15px 25px;
            }
            .prev-btn, .next-btn {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .prev-btn { left: 15px; }
            .next-btn { right: 15px; }
            .home-btn {
                padding: 10px 25px;
                font-size: 16px;
                bottom: 20px;
            }
            .music-btn {
                top: 20px;
                right: 20px;
                padding: 8px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景音乐 -->
    <audio id="bg-music" loop>
        <source src="1.ogg" type="audio/ogg">
        <source src="1.mp3" type="audio/mpeg"> <!-- 兼容备用 -->
    </audio>

    <!-- 固定视频背景（0.75倍速，不切换） -->
    <video class="video-bg" loop muted autoplay playsinline>
        <source src="bt.mp4" type="video/mp4">
        <!-- <source src="bt.webm" type="video/webm"> -->
    </video>

    <!-- 可切换的图片层（叠加在视频上） -->
    <div class="image-layer" id="imageLayer"></div>

    <!-- 标题容器（仅首页视频显示） -->
    <div class="title-container" id="titleContainer">
        <p id="zhaozha-title">“欢迎来到嘲哳 Project”</p>
    </div>

    <!-- 按钮组 -->
    <button class="prev-btn">◀</button> <!-- 左按钮：切下一张图 -->
    <button class="next-btn">▶</button> <!-- 右按钮：切上一张图 -->
    <button class="home-btn">回到首页</button>
    <button class="music-btn">暂停音乐</button>

    <script>
        // ========== 基础元素初始化 ==========
        // 音乐相关
        const bgMusic = document.getElementById('bg-music');
        const musicBtn = document.querySelector('.music-btn');
        let isMusicPlaying = false;

        // 图片相关
        const imageLayer = document.getElementById('imageLayer');
        const titleContainer = document.getElementById('titleContainer');
        // 图片列表（可新增）
        const images = [
            "fengmiantu.png",   // 索引0：非首页图片1
            "fengmiantu2.png"   // 索引1：非首页图片2
        ];
        let currentImageIndex = -1; // -1=首页（无图片），0+=非首页图片

        // 视频相关（固定背景，0.75倍速）
        const videoBg = document.querySelector('.video-bg');
        videoBg.playbackRate = 0.75; // 设置视频0.75倍速

        // ========== 解决浏览器自动播放限制 ==========
        function initMedia() {
            // 播放音乐
            bgMusic.play().then(() => {
                isMusicPlaying = true;
                musicBtn.textContent = "暂停音乐";
            }).catch(err => {
                console.log("音频需要用户交互：", err);
                musicBtn.textContent = "播放音乐";
            });

            // 播放视频（确保倍速生效）
            videoBg.play().then(() => {
                videoBg.playbackRate = 0.75; // 再次确认倍速
            }).catch(err => {
                console.log("视频需要用户交互：", err);
            });

            // 只执行一次
            document.removeEventListener('click', initMedia);
            document.removeEventListener('touchstart', initMedia);
        }
        document.addEventListener('click', initMedia);
        document.addEventListener('touchstart', initMedia);

        // ========== 音乐开关逻辑 ==========
        musicBtn.addEventListener('click', () => {
            if (isMusicPlaying) {
                bgMusic.pause();
                isMusicPlaying = false;
                musicBtn.textContent = "播放音乐";
            } else {
                bgMusic.play().catch(() => {
                    alert("请先点击页面空白处解锁音频权限");
                });
                isMusicPlaying = true;
                musicBtn.textContent = "暂停音乐";
            }
        });

        // ========== 核心切换逻辑 ==========
        // 更新图片和标题显示
        function updateDisplay() {
            if (currentImageIndex === -1) {
                // 首页：隐藏图片层，显示标题
                imageLayer.classList.remove('active');
                titleContainer.classList.remove('hidden');
            } else {
                // 非首页：显示图片层，隐藏标题
                imageLayer.style.backgroundImage = `url("${images[currentImageIndex % images.length]}")`;
                imageLayer.classList.add('active');
                titleContainer.classList.add('hidden');
            }
        }

        // 左按钮：切下一张图（首页→图片0→图片1→...）
        document.querySelector('.prev-btn').addEventListener('click', () => {
            currentImageIndex = (currentImageIndex + 1) % images.length;
            updateDisplay();
        });

        // 右按钮：切上一张图（图片1→图片0→首页）
        document.querySelector('.next-btn').addEventListener('click', () => {
            currentImageIndex--;
            if (currentImageIndex < -1) {
                currentImageIndex = images.length - 1;
            }
            updateDisplay();
        });

        // 回到首页：隐藏图片，显示视频+标题
        document.querySelector('.home-btn').addEventListener('click', () => {
            currentImageIndex = -1;
            updateDisplay();
        });

        // ========== 初始化 ==========
        // 预加载所有图片
        images.forEach(src => {
            const img = new Image();
            img.src = src;
        });
        // 初始显示首页（视频+标题）
        updateDisplay();
    </script>
</body>
</html>
