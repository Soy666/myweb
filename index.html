<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘲哳 Project</title>
    <meta http-equiv="Cache-Control" content="public, max-age=86400">
    <meta http-equiv="Pragma" content="cache">

    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 视频背景 - 强制优先加载 */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000; /* 兜底黑色，加载中不空白 */
            z-index: 1;
            /* 新增：让视频容器内的内容居中 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-bg {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 电脑端铺满 */
            object-position: center;
            display: block;
            transform: translateZ(0);
        }

        /* 标题容器 - 秒显，无依赖 */
        .title-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999;
            pointer-events: none;
        }

        #zhaozha-title {
            text-align: center;
            font-size: 60px;
            color: #fff;
            text-shadow: 0 0 15px #000;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 40px;
            border-radius: 10px;
            animation: float 4s ease-in-out infinite;
            transform: translateZ(0);
        }

        /* 按钮样式 - 仅保留核心按钮，删除左右箭头样式 */
        .home-btn, .start-btn, .music-btn {
            position: fixed;
            border: none;
            color: white;
            cursor: pointer;
            z-index: 20;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            background: rgba(0, 0, 0, 0.7);
            transition: background 0.1s ease;
        }

        .start-btn {
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 18px;
        }

        .home-btn {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 18px;
        }

        .music-btn {
            top: 30px;
            right: 30px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
        }

        .home-btn:hover, .start-btn:hover, .music-btn:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        @keyframes float {
            0% { transform: translateY(0px) translateZ(0); }
            50% { transform: translateY(-8px) translateZ(0); }
            100% { transform: translateY(0px) translateZ(0); }
        }

        audio {
            display: none;
        }

        /* 移动端适配 - 核心修改：视频等比缩小 */
        @media (max-width: 768px) {
            /* 移动端视频样式修改 */
            .video-bg {
                object-fit: contain !important; /* 完整显示，不裁切 */
                width: 80% !important; /* 缩小到80%，可改70%/60% */
                height: auto !important; /* 高度自动，保持比例 */
            }

            #zhaozha-title {
                font-size: 40px;
                padding: 15px 25px;
            }
            .start-btn {
                padding: 10px 25px;
                font-size: 16px;
                bottom: 80px;
            }
            .home-btn {
                padding: 10px 25px;
                font-size: 16px;
                bottom: 20px;
            }
            .music-btn {
                top: 20px;
                right: 20px;
                padding: 8px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景音乐 - 预加载改为metadata，仅加载元数据，减少资源占用 -->
    <audio id="bg-music" loop preload="metadata">
        <source src="1.ogg" type="audio/ogg">
        <source src="1.mp3" type="audio/mpeg">
    </audio>

    <!-- 视频 - 保留视频背景 -->
    <div class="video-container">
        <video class="video-bg" loop muted playsinline autoplay preload="auto" src="bt.mp4"></video>
    </div>

    <!-- 标题 - 秒显 -->
    <div class="title-container" id="titleContainer">
        <p id="zhaozha-title">“欢迎来到嘲哳 Project”</p>
    </div>

    <!-- 按钮组 - 删除左右箭头按钮 -->
    <button class="start-btn">开始找寻</button>
    <button class="home-btn">回到首页</button>
    <button class="music-btn">播放音乐</button>

    <script>
        // DOM缓存 - 删除图片和左右箭头相关DOM引用
        const bgMusic = document.getElementById('bg-music');
        const musicBtn = document.querySelector('.music-btn');
        const titleContainer = document.getElementById('titleContainer');
        const videoBg = document.querySelector('.video-bg');
        const homeBtn = document.querySelector('.home-btn');
        const startBtn = document.querySelector('.start-btn');

        // 状态管理 - 删除图片相关状态
        let isMusicPlaying = false;
        let isAudioLoaded = false; // 标记音频是否已加载

        // 确保视频持续播放的核心函数
        function ensureVideoPlaying() {
            // 直接恢复视频播放（无图片层干扰）
            if (videoBg.paused) {
                videoBg.play().catch(err => {
                    console.log('恢复视频播放:', err);
                });
            }
        }

        // 初始化音频加载（异步执行，不阻塞主线程）
        async function initAudio() {
            if (isAudioLoaded) return;
            try {
                await bgMusic.load();
                isAudioLoaded = true;
                console.log('音频初始化完成');
            } catch (err) {
                console.log('音频初始化失败:', err);
            }
        }

        // 音频播放/暂停逻辑优化
        musicBtn.addEventListener('click', async () => {
            if (isMusicPlaying) {
                // 暂停音乐
                bgMusic.pause();
                isMusicPlaying = false;
                musicBtn.textContent = "播放音乐";
            } else {
                // 先初始化音频（仅第一次执行）
                await initAudio();
                // 播放音乐，使用异步方式避免阻塞
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                    musicBtn.textContent = "暂停音乐";
                    // 播放音乐后立即检查视频状态，确保视频继续播放
                    ensureVideoPlaying();
                }).catch(() => {
                    alert("请先点击页面空白处解锁音频");
                    // 即使音频播放失败，也要恢复视频播放
                    ensureVideoPlaying();
                });
            }
            // 每次操作音频后都检查视频状态
            ensureVideoPlaying();
        });

        // 按钮事件 - 仅保留核心按钮逻辑
        homeBtn.addEventListener('click', () => {
            // 回到首页仅确保视频播放
            ensureVideoPlaying();
            titleContainer.style.display = 'block';
        });

        startBtn.addEventListener('click', () => {
            window.location.href = 'index2.html';
        });

        // 监听视频暂停事件，自动恢复
        videoBg.addEventListener('pause', () => {
            setTimeout(ensureVideoPlaying, 100); // 延迟恢复，避免频繁触发
        });

        // 定时检查视频状态，确保不会停止播放
        setInterval(ensureVideoPlaying, 1000);

        // 初始化：页面加载完成就显示标题，视频已自动播放
        window.addEventListener('load', () => {
            titleContainer.style.display = 'block';
            videoBg.playbackRate = 0.75; // 确保播放速度生效
            // 预加载音频但不播放
            initAudio();
        });

        // 更早触发视频加载
        document.addEventListener('DOMContentLoaded', () => {
            videoBg.load();
        });
    </script>
</body>
</html>
