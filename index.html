<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>嘲哳 Project</title>
    <!-- 1. 强化缓存策略，减少重复请求 -->
    <meta http-equiv="Cache-Control" content="public, max-age=2592000, immutable"> <!-- 缓存30天 -->
    <meta http-equiv="Pragma" content="cache">
    <meta http-equiv="Expires" content="31536000"> <!-- 长期缓存 -->
    
    <!-- 2. 预连接+DNS预解析，减少网络握手耗时 -->
    <link rel="preconnect" href="./assets/mp4/"> <!-- 预连接视频目录 -->
    <link rel="dns-prefetch" href="./assets/mp4/">
    
    <!-- 3. 精准预加载：优先预加载视频第一帧，而非整个视频（大幅减少首屏加载压力） -->
    <link rel="preload" as="image" href="./assets/cover.jpg"> <!-- 预加载封面图 -->
    <link rel="preload" as="video" href="./assets/mp4/bt.mp4" type="video/mp4" crossorigin="anonymous" fetchpriority="high"> <!-- 高优先级预加载视频 -->
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        
        * { -webkit-tap-highlight-color: transparent; }
        html, body { touch-action: manipulation; }
        
        #bgVideo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0;
            /* 优化视频渲染性能 */
            will-change: transform;
            backface-visibility: hidden;
        }
    </style>
</head>
<body class="bg-black min-h-screen overflow-hidden relative">
    <!-- 视频背景（核心优化：加载策略+分段加载） -->
    <div class="fixed inset-0 z-0 bg-black">
        <video 
            id="bgVideo" 
            loop 
            muted 
            playsinline 
            autoplay 
            preload="metadata"  <!-- 仅预加载元数据（时长/尺寸），而非整个视频，大幅提速 -->
            poster="./assets/cover.jpg" <!-- 封面图兜底，视频加载前立即显示 -->
            <!-- 4. 添加 crossorigin 解决跨域缓存问题，提升加载效率 -->
            crossorigin="anonymous"
            <!-- 5. 优化视频源顺序，优先加载小体积格式 -->
            src="./assets/mp4/bt.mp4">
            <source src="./assets/mp4/bt.mp4" type="video/mp4" media="all">
            <source src="./assets/mp4/bt.webm" type="video/webm" media="all">
        </video>
        <div class="absolute inset-0 bg-gradient-to-b from-black via-transparent to-black pointer-events-none"></div>
    </div>

    <!-- 顶部 Header -->
    <header class="fixed top-0 left-0 right-0 z-50 px-3 py-2.5 sm:px-5 sm:py-3 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent">
        <button id="homeBtn" class="text-lg font-bold text-gray-300 hover:text-white transition-colors tracking-wider px-2 py-1">主页</button>
        <button id="musicBtn" class="text-lg font-bold text-gray-300 hover:text-white transition-colors tracking-wider px-2 py-1">音乐</button>
    </header>

    <!-- 标题容器 + 开始按钮 -->
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-40 flex flex-col items-center gap-6 sm:gap-8">
        <p class="text-center text-2xl sm:text-4xl md:text-5xl lg:text-6xl text-gray-100 tracking-[0.15em] bg-black/50 px-6 py-4 sm:px-10 sm:py-6 rounded-sm animate-float font-light pointer-events-none">欢迎来到嘲哳 Project</p>
        <button id="startBtn" class="text-xs sm:text-sm text-gray-400 bg-black/70 hover:text-white transition-all tracking-[0.2em] px-6 py-2 sm:px-8 sm:py-3 border border-gray-700 hover:border-gray-500 hover:bg-white/5 pointer-events-auto">开始找寻</button>
    </div>

    <!-- 背景音乐 -->
    <audio id="bg-music" loop preload="metadata">
        <source src="./assets/mp4/1.ogg" type="audio/ogg">
        <source src="./assets/mp4/1.mp3" type="audio/mpeg">
    </audio>

    <script src="./js/index.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const bgVideo = document.getElementById('bgVideo');
            const bgMusic = document.getElementById('bg-music');
            const startBtn = document.getElementById('startBtn');

            // 6. 优化视频加载逻辑：分段加载+懒加载非关键部分
            function optimizeVideoLoad() {
                // 仅加载视频元数据，第一帧加载完成后立即播放
                bgVideo.addEventListener('loadedmetadata', () => {
                    bgVideo.play().then(() => {
                        console.log('视频元数据加载完成，开始播放');
                    }).catch(err => {
                        console.log('自动播放失败，等待用户交互:', err);
                        document.addEventListener('click', () => {
                            bgVideo.play();
                        }, { once: true });
                    });
                });

                // 7. 视频加载失败时降级显示封面图，避免空白
                bgVideo.addEventListener('error', () => {
                    bgVideo.style.display = 'none';
                    document.querySelector('.fixed.inset-0.z-0').style.backgroundImage = 'url(./assets/cover.jpg)';
                    document.querySelector('.fixed.inset-0.z-0').style.backgroundSize = 'cover';
                });
            }

            // 立即执行优化逻辑
            optimizeVideoLoad();

            // 点击开始按钮播放音乐
            startBtn.addEventListener('click', () => {
                bgMusic.play().catch(err => {
                    console.log('音乐播放失败:', err);
                    alert('请先点击页面空白处解锁音频播放');
                });
            });
        });
    </script>
</body>
</html>
