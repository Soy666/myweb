<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘲哳 Project</title>
    <link rel="stylesheet" href="style.css">

    <!-- 提前预加载核心图片（优先级最高） -->
    <link rel="preload" href="fengmiantu.png" as="image">
    <link rel="preload" href="fengmiantu2.png" as="image">

    <style>
        /* 全局重置 + 禁止页面闪烁 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* 先加载纯色背景，避免白屏，图片加载后无缝替换 */
        body {
            background: #000; /* 兜底背景色，和图片风格匹配 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 渲染优化：告诉浏览器优先处理背景 */
            will-change: background-image;
            backface-visibility: hidden;
            transform: translateZ(0); /* 开启硬件加速 */
            /* 背景图核心配置（兼顾速度和显示） */
            background-image: url("fengmiantu.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            /* 图片切换无卡顿 */
            transition: background-image 0.3s ease-out;
        }

        /* 标题容器 */
        .title-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            /* 文字先显示，不等待图片 */
            position: relative;
            z-index: 1;
        }

        /* 标题样式 */
        #zhaozha-title {
            text-align: center;
            font-size: 55px;
            color: white;
            text-shadow: 2px 2px 8px #000;
            animation: float 4s ease-in-out infinite;
        }

        /* 下方小箭头 */
        .down-arrow {
            color: white;
            font-size: 30px;
            text-shadow: 2px 2px 8px #000;
            animation: arrowFloat 3s ease-in-out infinite;
        }

        /* 右侧切换按钮（优化点击响应） */
        .next-btn {
            position: fixed;
            right: 30px;
            bottom: 50%;
            transform: translateY(50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            /* 点击无延迟 */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        .next-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: translateY(50%) scale(1.1);
        }

        /* 动画（降低性能消耗） */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        @keyframes arrowFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(8px); }
            100% { transform: translateY(0px); }
        }

        /* 移动端适配（无卡顿版） */
        @media (max-width: 768px) {
            body {
                background-size: cover; /* 保留cover，比contain更流畅 */
                background-attachment: scroll; /* 取消固定，避免手机卡顿 */
            }
            #zhaozha-title { font-size: 36px; }
            .down-arrow { font-size: 20px; }
            .next-btn {
                width: 40px;
                height: 40px;
                font-size: 20px;
                right: 15px;
            }
        }

        /* 隐藏冗余元素 */
        .Project-img { display: none; }
    </style>
</head>
<body>
    <div class="title-container">
        <p id="zhaozha-title">“欢迎来到嘲哳 Project”</p>
        <div class="down-arrow">▼</div>
    </div>

    <img src="fengmiantu.png" alt="嘲哳项目封面图" class="Project-img">
    <button class="next-btn">▶</button>

    <script>
        // 图片列表（提前缓存）
        const bgImages = [
            "fengmiantu.png",
            "fengmiantu2.png"
        ];
        let currentIndex = 0;
        const body = document.body;
        const nextBtn = document.querySelector('.next-btn');

        // 提前缓存所有图片，切换时无加载延迟
        const imageCache = [];
        bgImages.forEach(src => {
            const img = new Image();
            img.src = src;
            imageCache.push(img);
        });

        // 点击切换（无卡顿逻辑）
        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % bgImages.length;
            // 直接用缓存的图片，无加载延迟
            body.style.backgroundImage = `url("${bgImages[currentIndex]}")`;
        });
    </script>
</body>
</html>
