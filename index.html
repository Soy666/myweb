<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘲哳 Project</title>
    <link rel="stylesheet" href="style.css">

    <!-- 提前预加载核心图片 -->
    <link rel="preload" href="fengmiantu.png" as="image">
    <link rel="preload" href="fengmiantu2.png" as="image">

    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: #000;
            min-height: 100vh;
            /* 核心修改：垂直+水平居中 */
            display: flex;
            justify-content: center;
            align-items: center;
            /* 背景图配置 */
            background-image: url("fengmiantu.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            /* 性能优化 */
            will-change: background-image;
            backface-visibility: hidden;
            transform: translateZ(0);
            transition: background-image 0.3s ease-out;
        }

        /* 标题容器 */
        .title-container {
            position: relative;
            z-index: 10; /* 确保文字在最上层 */
        }

        /* 标题样式（居中+突出） */
        #zhaozha-title {
            text-align: center; /* 文字水平居中 */
            font-size: 60px;
            color: #fff;
            /* 强化阴影对抗复杂背景 */
            text-shadow: 0 0 10px #000, 0 0 20px #000, 2px 2px 4px rgba(0,0,0,0.8);
            /* 半透明背景层突出文字 */
            background: rgba(0, 0, 0, 0.5);
            padding: 20px 40px;
            border-radius: 10px;
            /* 保留浮动动画 */
            animation: float 4s ease-in-out infinite;
        }

        /* 右侧切换按钮 */
        .next-btn {
            position: fixed;
            right: 30px;
            bottom: 50%;
            transform: translateY(50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        .next-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: translateY(50%) scale(1.1);
        }

        /* 回到首页按钮样式 */
        .home-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            z-index: 20;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }

        .home-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: translateX(-50%) scale(1.05);
        }

        /* 浮动动画 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                background-size: cover;
                background-attachment: scroll;
            }
            #zhaozha-title {
                font-size: 40px;
                padding: 15px 25px;
            }
            .next-btn {
                width: 40px;
                height: 40px;
                font-size: 20px;
                right: 15px;
            }
            .home-btn {
                padding: 10px 25px;
                font-size: 16px;
                bottom: 20px;
            }
        }

        .Project-img { display: none; }
    </style>
</head>
<body>
    <div class="title-container">
        <p id="zhaozha-title">“欢迎来到嘲哳 Project”</p>
    </div>

    <img src="fengmiantu.png" alt="嘲哳项目封面图" class="Project-img">
    <button class="next-btn">▶</button>
    <button class="home-btn">回到首页</button>

    <script>
        const bgImages = [
            "fengmiantu.png",
            "fengmiantu2.png"
        ];
        let currentIndex = 0;
        const body = document.body;
        const nextBtn = document.querySelector('.next-btn');
        const homeBtn = document.querySelector('.home-btn');

        // 图片缓存
        const imageCache = [];
        bgImages.forEach(src => {
            const img = new Image();
            img.src = src;
            imageCache.push(img);
        });

        // 切换下一张逻辑
        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % bgImages.length;
            body.style.backgroundImage = `url("${bgImages[currentIndex]}")`;
        });

        // 回到首页逻辑
        homeBtn.addEventListener('click', () => {
            currentIndex = 0;
            body.style.backgroundImage = `url("${bgImages[currentIndex]}")`;
        });
    </script>
</body>
</html>
