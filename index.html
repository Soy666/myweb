<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>嘲哳 Project</title>
    <meta http-equiv="Cache-Control" content="public, max-age=2592000, immutable">
    <meta http-equiv="Pragma" content="cache">
    <!-- 🔥 视频加速：预连接 + DNS预解析视频资源域名 -->
    <link rel="preconnect" href="./assets/mp4/" crossorigin>
    <link rel="dns-prefetch" href="./assets/mp4/">
    <!-- 🔥 预加载视频资源（最高优先级） -->
    <link rel="preload" as="video" href="./assets/mp4/bt.mp4" fetchpriority="high">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }

        * {
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            touch-action: manipulation;
            overflow: hidden;
            background: #000;
        }

        /* 视频硬解加速，彻底不卡 */
        #bgVideo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
            transform: translate(-50%, -50%) translateZ(0);
            backface-visibility: hidden;
            will-change: transform;
            /* 🔥 新增：强制硬件解码 + 禁用缓冲限制 */
            -webkit-transform: translate(-50%, -50%) translateZ(0);
            -webkit-backface-visibility: hidden;
            -webkit-will-change: transform;
        }
    </style>
</head>

<body class="bg-black min-h-screen">

    <!-- 视频背景：极致流畅 -->
    <div class="fixed inset-0 z-0 bg-black">
        <video
            id="bgVideo"
            loop
            muted
            playsinline
            autoplay
            preload="auto"
            src="./assets/mp4/bt.mp4"
            crossorigin="anonymous"
            <!-- 🔥 新增：最高加载优先级 + 立即解码 + 无延迟播放 -->
            fetchpriority="high"
            decoding="sync"
            autoplay="autoplay"
            muted="muted"
            playsinline="playsinline"
        ></video>
        <div class="absolute inset-0 bg-gradient-to-b from-black via-black/20 to-black pointer-events-none"></div>
    </div>

    <!-- 顶部 -->
    <header class="fixed top-0 left-0 right-0 z-50 px-3 py-2.5 sm:px-5 sm:py-3 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent">
        <button id="homeBtn" class="text-lg font-bold text-gray-300 hover:text-white transition-colors tracking-wider px-2 py-1">主页</button>
        <button id="musicBtn" class="text-lg font-bold text-gray-300 hover:text-white transition-colors tracking-wider px-2 py-1">音乐</button>
    </header>

    <!-- 标题 + 按钮 -->
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-40 flex flex-col items-center gap-6">
        <p class="text-center text-2xl sm:text-4xl md:text-5xl lg:text-6xl text-gray-100 tracking-[0.15em] bg-black/50 px-6 py-4 sm:px-10 sm:py-6 rounded-sm animate-float font-light">
            欢迎来到嘲哳 Project
        </p>
        <button id="startBtn" class="text-xs sm:text-sm text-gray-400 bg-black/70 hover:text-white transition-all tracking-[0.2em] px-6 py-2 sm:px-8 sm:py-3 border border-gray-700 hover:border-gray-500 hover:bg-white/5">
            开始找寻
        </button>
    </div>

    <!-- 音乐：预加载 + 流畅播放 -->
    <audio
        id="bg-music"
        loop
        preload="auto"
        crossorigin="anonymous"
    >
        <source src="./assets/mp4/1.ogg" type="audio/ogg">
        <source src="./assets/mp4/1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 🔥 视频加速脚本：DOM解析完成立即初始化视频
        document.addEventListener('DOMContentLoaded', function() {
            const bgVideo = document.getElementById('bgVideo');
            
            // 1. 强制视频最高优先级加载
            bgVideo.fetchPriority = 'high';
            
            // 2. 立即加载视频，跳过浏览器默认延迟
            if (bgVideo.paused && !bgVideo.readyState) {
                bgVideo.load(); // 强制重新加载（利用预加载缓存）
            }
            
            // 3. 视频可播放时立即播放，无延迟
            bgVideo.addEventListener('canplaythrough', function() {
                if (bgVideo.paused) {
                    bgVideo.play().catch(e => {
                        // 兼容移动端自动播放限制（静默失败，不影响体验）
                        console.log('视频自动播放触发限制，尝试恢复:', e);
                        bgVideo.muted = true;
                        bgVideo.play();
                    });
                }
            }, { once: true });
            
            // 4. 硬件加速兜底，确保流畅播放
            bgVideo.style.transform = 'translate(-50%, -50%) translateZ(0)';
            bgVideo.style.willChange = 'transform';
        });
    </script>
    <script src="./js/index.js"></script>
</body>
</html>
