<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘲哳 Project</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">

    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 视频背景 - 强制立即加载 */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000; /* 兜底黑色 */
            z-index: 1;
        }

        .video-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        /* 图片层 - 占位符+按需加载 */
        .image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000; /* 占位符 */
            background-size: cover;
            background-position: center;
            z-index: 2;
            display: none;
        }

        .image-layer.active {
            display: block;
        }

        /* 标题容器 - 秒显，无依赖 */
        .title-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 999;
            pointer-events: none;
        }

        .title-container.hidden {
            display: none;
        }

        #zhaozha-title {
            text-align: center;
            font-size: 60px;
            color: #fff;
            text-shadow: 0 0 15px #000;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 40px;
            border-radius: 10px;
            animation: float 4s ease-in-out infinite;
            transform: translateZ(0);
        }

        /* 按钮样式 */
        .prev-btn, .next-btn, .home-btn, .start-btn, .music-btn {
            position: fixed;
            border: none;
            color: white;
            cursor: pointer;
            z-index: 20;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            background: rgba(0, 0, 0, 0.7);
            transition: background 0.1s ease;
        }

        .prev-btn {
            left: 30px;
            bottom: 50%;
            transform: translateY(50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .next-btn {
            right: 30px;
            bottom: 50%;
            transform: translateY(50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .start-btn {
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 18px;
        }

        .home-btn {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 18px;
        }

        .music-btn {
            top: 30px;
            right: 30px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
        }

        .prev-btn:hover, .next-btn:hover, .home-btn:hover, .start-btn:hover, .music-btn:hover {
            background: rgba(0, 0, 0, 0.9);
        }

        @keyframes float {
            0% { transform: translateY(0px) translateZ(0); }
            50% { transform: translateY(-8px) translateZ(0); }
            100% { transform: translateY(0px) translateZ(0); }
        }

        audio {
            display: none;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            #zhaozha-title {
                font-size: 40px;
                padding: 15px 25px;
            }
            .prev-btn, .next-btn {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .prev-btn { left: 15px; }
            .next-btn { right: 15px; }
            .start-btn {
                padding: 10px 25px;
                font-size: 16px;
                bottom: 80px;
            }
            .home-btn {
                padding: 10px 25px;
                font-size: 16px;
                bottom: 20px;
            }
            .music-btn {
                top: 20px;
                right: 20px;
                padding: 8px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景音乐 - 完全懒加载 -->
    <audio id="bg-music" loop preload="none">
        <source src="1.ogg" type="audio/ogg">
        <source src="1.mp3" type="audio/mpeg">
    </audio>

    <!-- 视频容器 - 立即加载+自动播放 -->
    <div class="video-container">
        <video class="video-bg" loop muted playsinline autoplay preload="auto" src="bt.mp4"></video>
    </div>

    <!-- 图片层 -->
    <div class="image-layer" id="imageLayer"></div>

    <!-- 标题 - 秒显 -->
    <div class="title-container" id="titleContainer">
        <p id="zhaozha-title">“欢迎来到嘲哳 Project”</p>
    </div>

    <!-- 按钮组 -->
    <button class="prev-btn">◀</button>
    <button class="next-btn">▶</button>
    <button class="start-btn">开始找寻</button>
    <button class="home-btn">回到首页</button>
    <button class="music-btn">播放音乐</button>

    <script>
        // DOM缓存 - 只查一次，提升性能
        const bgMusic = document.getElementById('bg-music');
        const musicBtn = document.querySelector('.music-btn');
        const imageLayer = document.getElementById('imageLayer');
        const titleContainer = document.getElementById('titleContainer');
        const videoBg = document.querySelector('.video-bg');
        const prevBtn = document.querySelector('.prev-btn');
        const nextBtn = document.querySelector('.next-btn');
        const homeBtn = document.querySelector('.home-btn');
        const startBtn = document.querySelector('.start-btn');

        // 状态管理
        let isMusicPlaying = false;
        const images = [
            "fengmiantu.png",
            "fengmiantu2.png"
        ];
        let currentImageIndex = -1;
        const imageCache = new Map(); // 图片缓存，避免重复加载

        // ========== 图片懒加载逻辑（保留） ==========
        /**
         * 图片懒加载：只有点击切换时才加载，且缓存
         * @param {string} src 图片路径
         * @returns {Promise<HTMLImageElement|null>} 加载后的图片对象
         */
        function lazyLoadImage(src) {
            // 缓存命中则直接返回
            if (imageCache.has(src)) {
                return Promise.resolve(imageCache.get(src));
            }

            return new Promise((resolve) => {
                const img = new Image();
                // 跨域兼容
                img.crossOrigin = 'anonymous';
                img.src = src;
                
                // 加载成功：缓存并返回
                img.onload = () => {
                    imageCache.set(src, img);
                    resolve(img);
                };
                
                // 加载失败：返回null
                img.onerror = () => resolve(null);
            });
        }

        /**
         * 更新显示逻辑
         */
        async function updateDisplay() {
            if (currentImageIndex === -1) {
                // 首页状态：显示标题，隐藏图片层
                imageLayer.classList.remove('active');
                titleContainer.classList.remove('hidden');
                // 视频已经自动加载播放，无需额外操作
            } else {
                // 图片浏览状态：显示图片层，隐藏标题
                imageLayer.classList.add('active');
                titleContainer.classList.add('hidden');
                
                // 计算图片索引（处理负数）
                const imgIndex = Math.abs(currentImageIndex) % images.length;
                const imgSrc = images[imgIndex];
                
                // 懒加载图片，加载完成后才显示
                const img = await lazyLoadImage(imgSrc);
                if (img) {
                    imageLayer.style.backgroundImage = `url("${imgSrc}")`;
                }
            }
        }

        // ========== 按钮事件 ==========
        // 上一张：仅点击时加载对应图片
        prevBtn.addEventListener('click', () => {
            currentImageIndex++;
            updateDisplay();
        });

        // 下一张：仅点击时加载对应图片
        nextBtn.addEventListener('click', () => {
            currentImageIndex--;
            updateDisplay();
        });

        // 回到首页：仅切换显示，视频已在播放
        homeBtn.addEventListener('click', () => {
            currentImageIndex = -1;
            updateDisplay();
        });

        // 开始找寻：跳转到index2.html
        startBtn.addEventListener('click', () => {
            window.location.href = 'index2.html';
        });

        // 音乐：仅点击时才加载播放
        musicBtn.addEventListener('click', () => {
            if (isMusicPlaying) {
                bgMusic.pause();
                isMusicPlaying = false;
                musicBtn.textContent = "播放音乐";
            } else {
                // 点击时才加载音频
                bgMusic.load();
                bgMusic.play().catch(() => {
                    alert("请先点击页面空白处解锁音频");
                });
                isMusicPlaying = true;
                musicBtn.textContent = "暂停音乐";
            }
        });

        // ========== 初始化 ==========
        // 页面加载完成后立即显示标题，视频已自动加载
        window.addEventListener('load', () => {
            updateDisplay();
            // 强制设置视频播放速度（确保生效）
            videoBg.playbackRate = 0.75;
        });

        // DOM解析完成就触发视频加载（更早）
        document.addEventListener('DOMContentLoaded', () => {
            videoBg.load();
        });
    </script>
</body>
</html>
