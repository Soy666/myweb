<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>嘲哳 Project - 项目详情</title>
    <!-- 1. 强化缓存策略：延长缓存时间+禁止重复验证，减少请求 -->
    <meta http-equiv="Cache-Control" content="public, max-age=2592000, immutable, stale-while-revalidate=86400">
    <meta http-equiv="Pragma" content="cache">
    <meta http-equiv="Expires" content="31536000"> <!-- 缓存1年，避免重复请求 -->
    
    <!-- 2. 预连接+DNS预解析：提前建立网络连接，减少握手耗时 -->
    <link rel="dns-prefetch" href="./assets/"> <!-- 预解析资源目录DNS -->
    <link rel="preconnect" href="./assets/"> <!-- 预连接资源目录 -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com"> <!-- 预连接Tailwind CDN -->
    
    <!-- 3. 预加载关键资源（为后续新增图片预留） -->
    <!-- 若后续有首屏图片，添加以下预加载代码：
    <link rel="preload" as="image" href="./assets/image/xxx.png" fetchpriority="high" imagesizes="100vw">
    -->
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            touch-action: manipulation;
        }

        /* 基础动画与样式优化 */
        .content-fade {
            opacity: 0;
            animation: fadeIn 0.8s ease-in-out forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /* 4. 图片加载核心优化：占位+硬件加速+渐进式渲染 */
        img {
            /* 硬件加速，提升渲染速度 */
            transform: translateZ(0);
            will-change: opacity;
            /* 渐进式加载过渡，更丝滑 */
            transition: opacity 0.5s ease-in-out, transform 0.3s ease;
            opacity: 0;
            /* 占位背景，避免加载前空白 */
            background: #1a1a1a;
            /* 提前定义尺寸，避免布局抖动 */
            aspect-ratio: 16/9; /* 通用图片比例，可根据实际调整 */
            object-fit: contain; /* 保持图片比例，不拉伸 */
        }
        img.loaded {
            opacity: 1;
            /* 加载完成轻微放大，提升视觉体验 */
            transform: translateZ(0) scale(1.01);
        }
        img.error {
            opacity: 1;
            background: #222;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            aspect-ratio: 16/9;
        }
        
        /* 新增：线索按钮样式（匹配页面整体风格 + 强制居中） */
        .btn-clue {
            transition: all 0.3s ease;
            border: 1px solid #4b5563;
            background-color: rgba(31, 41, 55, 0.3);
            text-align: center;
        }
        .btn-clue:hover {
            background-color: rgba(55, 65, 81, 0.5);
            border-color: #6b7280;
            transform: translateY(-2px);
        }
        /* 容器强制居中（双重保障） */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
    </style>
</head>

<body class="bg-black min-h-screen text-gray-400 text-sm sm:text-base leading-relaxed">
    <!-- 顶部返回按钮：修复语法错误 + 正确路径 -->
    <header
        class="fixed top-0 left-0 right-0 z-50 px-3 py-2.5 sm:px-5 sm:py-3 flex justify-start items-center bg-gradient-to-b from-black/80 to-transparent">
        <button onclick="window.location.href='./index.html'"
            class="text-lg font-bold text-gray-300 hover:text-white transition-colors tracking-wider px-2 py-1">
            返回主页
        </button>
    </header>

    <!-- 核心内容区域 -->
    <div class="min-h-screen flex items-center justify-center px-4 py-8 pt-20 sm:pt-24">
        <div class="max-w-3xl w-full content-fade">
            <div class="space-y-6 text-gray-300 border border-gray-600 rounded-2xl p-6 sm:p-8 lg:p-12">
                <!-- 页面标题 -->
                <h2 class="text-xl sm:text-2xl md:text-3xl text-center text-white font-light tracking-[0.1em] mb-8">
                    嘲哳 Project · 更多故事
                </h2>

                <!-- 内容段落 -->
                <p>
                    随着嘲哳项目的推进，我们收集到了更多关于这个失落媒体的线索。不同于最初的猜想，「嘲哳」并非单一的游戏或影像，而是一系列碎片化的信息集合，散落于不同的网络角落。
                </p>
                
                <p class="pt-4">
                    团队成员通过梳理早期互联网存档、论坛帖子和匿名投稿，还原了更多细节：
                </p>

                <!-- 列表内容 -->
                <ul class="list-disc list-inside space-y-2 pl-4 pt-2 text-gray-400">
                    <li>我们重构的版本，试图还原这些碎片化线索背后的故事内核。</li>
                </ul>

                <!-- 修复后的按钮区域：新增第二个按钮，样式保持一致 -->
                <div class="pt-6 space-y-4"> <!-- 调整space-y为4，让按钮间距更合理 -->
                    <!-- 第一个按钮：嘲哳的线索 -->
                    <div class="btn-container">
                        <button 
                            class="btn-clue w-2/3 rounded-sm px-8 py-4 text-lg text-gray-200 font-medium tracking-wider"
                            onclick="window.location.href='./gift.html'"
                        >
                            问影
                        </button>
                    </div>
                    
                    <!-- 第二个按钮：跳转到wenan.html -->
                    <div class="btn-container">
                        <button 
                            class="btn-clue w-2/3 rounded-sm px-8 py-4 text-lg text-gray-200 font-medium tracking-wider"
                            onclick="window.location.href='./wenan.html'" <!-- 修正跳转链接为wenan.html -->
                        
                            寻章
                        </button>
                    </div>
                    
                    <p class="text-center text-xs text-gray-500 tracking-wider">似乎可以点击进去?</p>
                </div>

                <!-- 结尾内容 -->
                <p class="pt-8 text-gray-400">
                    我们仍在持续收集和整理相关线索，如果你有关于「嘲哳」的任何记忆或线索，欢迎通过项目邮箱联系我们。<br>
                    所有的碎片，终将拼凑出完整的真相。
                <br>
                QQ群:1059990343    
                </p>
            </div>
        </div>
    </div>

    <!-- 5. 图片加载优化脚本：自动标记加载状态+容错+懒加载 -->
    <script>
        // 图片加载完成自动标记loaded类
        document.querySelectorAll('img').forEach(img => {
            // 懒加载（适配所有图片）
            img.loading = img.loading || 'lazy';
            
            // 加载完成标记
            img.onload = function() {
                this.classList.add('loaded');
            };
            
            // 加载失败兜底
            img.onerror = function() {
                this.classList.add('error');
                this.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgZmlsbD0iIzIyMiIvPjx0ZXh0IHg9IjIwMCIgeT0iMTUwIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1zaXplPSIyMCIgZm9udC1mYW1pbHk9IkFyaWFsIiB7IkNvbG9yIjoiIzY2NiIsIkNvbG9yLURvcGFjayI6IiM0NDQiLCJTdGFydCI6IiLnlLXlv4MifTwvdGV4dD48L3N2Zz4=';
            };
        });

        // 兼容低网速/省流量模式：降级加载图片
        if ('connection' in navigator && navigator.connection.saveData) {
            document.querySelectorAll('img').forEach(img => {
                // 若有低分辨率图片，优先加载
                if (img.src.includes('@2x')) {
                    img.src = img.src.replace('@2x', '');
                }
            });
        }
    </script>
</body>
</html>
