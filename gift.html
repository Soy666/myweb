<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>嘲哳 Project - 线索详情</title>
    <meta http-equiv="Cache-Control" content="public, max-age=2592000, immutable, stale-while-revalidate=86400">
    <meta http-equiv="Pragma" content="cache">
    <meta http-equiv="Expires" content="31536000">
    
    <link rel="dns-prefetch" href="./assets/image/">
    <link rel="preconnect" href="./assets/image/">
    
    <link rel="preload" as="image" href="./assets/image/封面1.png" fetchpriority="high">
    <link rel="preload" as="image" href="./assets/image/封面3.png" fetchpriority="low">
    <link rel="preload" as="image" href="./assets/image/封面2.png" fetchpriority="low">
    
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .btn-clue {
            transition: all 0.3s ease;
            border: 1px solid #4b5563;
            background-color: rgba(31, 41, 55, 0.3);
            text-align: center;
            cursor: pointer;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin: 2rem 0 0.5rem;
        }
        .btn-clue:hover {
            background-color: rgba(55, 65, 81, 0.5);
            border-color: #6b7280;
        }

        html,
        body {
            touch-action: manipulation;
            background-color: #000;
        }

        #wan1 {
            font-size: 18px;
            text-align: center;
            color: #9ca3af;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .image-desc {
            text-align: center;
            font-size: 1rem;
            color: #9ca3af;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
        }

        .content-fade {
            opacity: 0;
            animation: fadeIn 0.8s ease-in-out forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 0.625rem 0.75rem;
            display: flex;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
        }

        .btn-back {
            font-size: 1.125rem;
            font-weight: 700;
            color: #d1d5db;
            transition: all 0.3s ease;
            padding: 0.5rem 0.5rem;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .btn-back:hover {
            color: #ffffff;
        }

        .image-container {
            max-width: 90%;
            margin: 0 auto;
            padding: 1rem;
        }

        .clue-image {
            width: 100%;
            max-width: 700px;
            height: auto;
            border-radius: 0.375rem;
            border: 1px solid #4b5563;
            margin: 0 auto 1rem;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateZ(0);
            will-change: opacity, transform;
            animation: fadeIn 1s ease-in-out forwards 0.2s;
            display: block;
            background: #1a1a1a;
            object-fit: contain;
        }

        .clue-image.larger {
            max-width: 800px;
        }

        .clue-image:hover {
            transform: translateZ(0) scale(1.02);
            box-shadow: 0 0 15px rgba(107, 114, 128, 0.3);
        }

        /* 移除loaded类相关样式（无实际作用了） */
        .clue-image.error {
            opacity: 1;
            background: #222;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            aspect-ratio: 4/3;
        }

        .main-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5rem 1rem 2rem;
        }

        .card {
            max-width: 3xl;
            width: 100%;
            color: #d1d5db;
            border: 1px solid #4b5563;
            border-radius: 0.5rem;
            padding: 1.5rem;
            background-color: rgba(17, 24, 39, 0.8);
        }

        .page-title {
            font-size: 1.25rem;
            text-align: center;
            color: #ffffff;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body class="bg-black min-h-screen text-gray-400 text-sm sm:text-base leading-relaxed">
    <header class="header">
        <button class="btn-back" onclick="window.location.href='./other.html'">
            返回上一页
        </button>
    </header>

    <div class="main-container content-fade">
        <div class="card">
            <h2 class="page-title">
                嘲哳的线索
            </h2>

            <div class="image-container">
                <img src="./assets/image/封面1.png" 
                     alt="嘲哳线索1" 
                     class="clue-image larger"  
                     loading="eager">
                <p id="wan1">由画师"万俟循"贡献的封面图1</p>

                <img src="./assets/image/封面3.png"
                     alt="嘲哳线索2"
                     class="clue-image"
                     loading="lazy">
                <p class="image-desc">由画师"黑米"贡献的封面图2</p>

                <img src="./assets/image/封面2.png"
                     alt="嘲哳线索3"
                     class="clue-image"
                     loading="lazy">
                <p class="image-desc">由画师"黑米"贡献的封面图3</p>
            </div>

            <div class="btn-container">
                <!-- 核心修改：替换onclick事件为弹窗提示 -->
                <button 
                    class="btn-clue w-2/3 rounded-sm px-8 py-4 text-lg text-gray-200 font-medium tracking-wider"
                    onclick="alert('剩下的我还没写')"
                >
                    更多线索？
                </button>
            </div>
            <p class="text-center text-xs text-gray-500 tracking-wider">找到它</p>
        </div>
    </div>

    <script>
        // 仅保留图片加载失败的兜底逻辑，删除onload相关代码
        document.querySelectorAll('.clue-image').forEach(img => {
            img.onerror = function () {
                this.classList.add('error');
                this.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgZmlsbD0iIzIyMiIvPjx0ZXh0IHg9IjIwMCIgeT0iMTUwIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1zaXplPSIyMCIgZm9udC1mYW1pbHk9IkFyaWFsIiB7IkNvbG9yIjoiIzY2NiIsIkNvbG9yLURvcGFjayI6IiM0NDQiLCJTdGFydCI6IueUteWKoOi9veS6rOi9vSJ9PC90ZXh0Pjwvc3ZnPg==';
                this.alt = '图片加载失败';
            };
        });
    </script>
</body>
</html>
