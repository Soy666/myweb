<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>嘲哳 Project - 线索详情</title>
    <!-- 缓存策略优化 -->
    <meta http-equiv="Cache-Control" content="public, max-age=86400, stale-while-revalidate=3600">
    <meta http-equiv="Pragma" content="cache">
    <!-- 预连接CDN -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 修复：按钮样式移出嵌套，单独定义 */
        .btn-clue {
            transition: all 0.3s ease;
            border: 1px solid #4b5563;
            background-color: rgba(31, 41, 55, 0.3);
            text-align: center; /* 按钮文字居中 */
            cursor: pointer; /* 鼠标悬浮显示手型 */
        }
        /* 按钮容器样式（居中） */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin: 2rem 0 0.5rem; /* 按钮和上方内容的间距 */
        }
        /* 按钮hover效果（增强交互） */
        .btn-clue:hover {
            background-color: rgba(55, 65, 81, 0.5);
            border-color: #6b7280;
        }

        html,
        body {
            touch-action: manipulation;
            background-color: #000;
        }

        /* 修复：wan1是id，用#；补全字号，删除多余闭合符 */
        #wan1 {
            font-size: 16px; /* 给文字设置字号 */
            text-align: center; /* 文字居中 */
            color: #9ca3af; /* 文字颜色和其他说明文字统一 */
            letter-spacing: 0.1em; /* 字间距统一 */
            margin-bottom: 1rem; /* 和下一张图片的间距 */
        }

        /* 基础渐入动画 */
        .content-fade {
            opacity: 0;
            animation: fadeIn 0.8s ease-in-out forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* 顶部导航栏样式（和原有页面一致） */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 0.625rem 0.75rem;
            padding-sm: 0.625rem 1.25rem;
            display: flex;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
        }

        /* 返回按钮样式（和原有页面一致） */
        .btn-back {
            font-size: 1.125rem;
            font-weight: 700;
            color: #d1d5db;
            transition: all 0.3s ease;
            padding: 0.5rem 0.5rem;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .btn-back:hover {
            color: #ffffff;
        }

        /* 图片容器样式（适配响应式） */
        .image-container {
            max-width: 90%; /* 调大容器宽度，适配封面1的放大 */
            margin: 0 auto;
            padding: 1rem;
        }

        /* 通用图片样式（封面2/3用这个） */
        .clue-image {
            width: 100%;
            max-width: 700px; /* 其他图片最大宽度700px */
            height: auto;
            border-radius: 0.375rem;
            border: 1px solid #4b5563;
            margin: 0 auto 1rem; /* 水平居中 + 底部间距 */
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s ease-in-out forwards 0.2s;
            display: block; /* 关键：确保margin:auto生效 */
        }

        /* 封面1专属样式（更大） */
        .clue-image.larger {
            max-width: 800px; /* 封面1最大宽度800px（比其他大100px） */
        }

        .clue-image:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(107, 114, 128, 0.3);
        }

        /* 图片说明文字样式 */
        .image-desc {
            text-align: center;
            font-size: 0.75rem;
            color: #9ca3af;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
        }

        /* 主内容容器（和原有页面一致） */
        .main-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5rem 1rem 2rem;
        }

        .card {
            max-width: 3xl;
            width: 100%;
            color: #d1d5db;
            border: 1px solid #4b5563;
            border-radius: 0.5rem;
            padding: 1.5rem;
            padding-sm: 2rem;
            padding-lg: 3rem;
            background-color: rgba(17, 24, 39, 0.8);
        }

        /* 页面标题样式（和原有页面一致） */
        .page-title {
            font-size: 1.25rem;
            font-size-sm: 1.5rem;
            font-size-md: 1.875rem;
            text-align: center;
            color: #ffffff;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body class="bg-black min-h-screen text-gray-400 text-sm sm:text-base leading-relaxed">
    <!-- 顶部返回导航栏（和原有页面风格一致） -->
    <header class="header">
        <button class="btn-back" onclick="window.location.href='./other.html'">
            返回上一页
        </button>
    </header>

    <!-- 核心内容区域 -->
    <div class="main-container content-fade">
        <div class="card">
            <!-- 页面标题 -->
            <h2 class="page-title">
                嘲哳的线索
            </h2>

            <!-- 图片展示区域（可添加多张图片） -->
            <div class="image-container">
                <!-- 第一张线索图片：添加larger类放大 -->
                <img src="assets/image/封面1.png" 
                     alt="嘲哳线索1 - 早期论坛截图" 
                     class="clue-image larger"  
                     onload="this.classList.add('loaded')">
                <p id="wan1">由画师"万俟循"贡献的封面图1</p>

                <!-- 第二张线索图片（保持原有大小） -->
                <img src="assets/image/封面3.png"
                     alt="嘲哳线索2 - 视频文件截图"
                     class="clue-image"
                     onload="this.classList.add('loaded')">
                <p class="image-desc">由画师"黑米"贡献的封面图2</p>

                <!-- 第三张线索图片（保持原有大小） -->
                <img src="assets/image/封面2.png"
                     alt="嘲哳线索3 - 视频文件截图"
                     class="clue-image"
                     onload="this.classList.add('loaded')">
                <p class="image-desc">由画师"黑米"贡献的封面图3</p>
            </div>

            <!-- 按钮区域 -->
            <div class="btn-container">
                <button 
                    class="btn-clue w-2/3 rounded-sm px-8 py-4 text-lg text-gray-200 font-medium tracking-wider"
                    onclick="window.location.href='./gift.html'"
                >
                    更多线索？
                </button>
            </div>
            <p class="text-center text-xs text-gray-500 tracking-wider">找到它</p>
        </div>
    </div>

    <!-- 图片加载失败兜底脚本 -->
    <script>
        // 图片加载失败时显示占位图
        document.querySelectorAll('.clue-image').forEach(img => {
            img.onerror = function () {
                this.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgZmlsbD0iIzIyMiIvPjx0ZXh0IHg9IjIwMCIgeT0iMTUwIiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1zaXplPSIyMCIgZm9udC1mYW1pbHk9IkFyaWFsIiB7IkNvbG9yIjoiIzY2NiIsIkNvbG9yLURvcGFjayI6IiM0NDQiLCJTdGFydCI6IueUteWKoOi9veS6rOi9vSJ9PC90ZXh0Pjwvc3ZnPg==';
                this.alt = '图片加载失败';
            };
        });
    </script>
</body>
</html>
